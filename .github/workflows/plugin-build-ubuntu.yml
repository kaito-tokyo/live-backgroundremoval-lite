name: Build Ubuntu

on:
  workflow_call:
    inputs:
      BUILDER_IMAGE_UBUNTU_X86_64:
        description: The builder image for Ubuntu x86_64
        required: true
        type: string
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: true
        type: string
      pluginbinary-retention-days:
        description: Days to retain plugin binary artifacts in GitHub Actions
        required: true
        type: number
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: false
        type: string
        default: ""

jobs:
  build-ubuntu-x86_64:
    name: Build Plugin for Ubuntu x86_64

    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    permissions:
      contents: read
      packages: read

    container:
      image: ${{ inputs.BUILDER_IMAGE_UBUNTU_X86_64 }}

    env:
      CLEAN_BASH_ENV: ${{ github.workspace }}/.github/scripts/clean-env-ubuntu.bash
      CREDENTIAL_GIT_CONFIG_PARAMETERS: "'url.https://x-access-token:${{ github.token }}@github.com/.insteadOf=https://github.com/'"
      MINIMAL_PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
      VCPKG_BINARY_SOURCES: ${{ inputs.VCPKG_BINARY_SOURCES }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec
        with:
          path: buildspec.json

      - name: Install dependencies from vcpkg (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          BASH_ENV: ${{ env.CLEAN_BASH_ENV }}
          GIT_CONFIG_PARAMETERS: ${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}
          PATH: ${{ env.MINIMAL_PATH }}
        run: '"$VCPKG_ROOT/vcpkg" install --x-install-root=./.deps_vendor/vcpkg_installed --triplet=x64-linux-obs'

      - name: Configure (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          BASH_ENV: ${{ env.CLEAN_BASH_ENV }}
          GIT_CONFIG_PARAMETERS: ${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}
          PATH: ${{ env.MINIMAL_PATH }}
        run: cmake --preset ubuntu-ci-x86_64

      - name: Build (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          BASH_ENV: ${{ env.CLEAN_BASH_ENV }}
          GIT_CONFIG_PARAMETERS: ${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}
          PATH: ${{ env.MINIMAL_PATH }}
        run: cmake --build --preset ubuntu-ci-x86_64

      - name: Package (Ubuntu x86_64)
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          BASH_ENV: ${{ env.CLEAN_BASH_ENV }}
          GIT_CONFIG_PARAMETERS: ${{ env.CREDENTIAL_GIT_CONFIG_PARAMETERS }}
          PATH: ${{ env.MINIMAL_PATH }}
        working-directory: build_x86_64
        run: cpack -G DEB

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.name }}-pluginbinary-${{ runner.os }}-x86_64-${{ github.run_id }}
          path: |
            release/*-x86_64-linux-gnu.deb
            release/*-x86_64-linux-gnu-dbgsym.ddeb
          if-no-files-found: error
          retention-days: ${{ inputs.pluginbinary-retention-days }}

name: Build Windows

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs
        required: true
        type: string
      pluginbinary-retention-days:
        description: Days to retain plugin binary artifacts in GitHub Actions
        required: true
        type: number
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: false
        type: string
        default: ""

env:
  VCPKG_BINARY_SOURCES: ${{ inputs.VCPKG_BINARY_SOURCES }}

jobs:
  build-windows-x64:
    name: Build Plugin for Windows x64

    environment: ${{ inputs.environment }}
    runs-on: windows-2022
    timeout-minutes: 180

    permissions:
      contents: read

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Extract plugin buildspec
        id: buildspec
        uses: ./.github/actions/extract-buildspec
        with:
          path: ./buildspec.json

      - name: Install dependencies from vcpkg (Windows x64)
        shell: bash
        run: |
          set -euo pipefail
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          "$VCPKG_INSTALLATION_ROOT/vcpkg" install \
            --x-install-root=./.deps_vendor/vcpkg_installed \
            --triplet=x64-windows-static-md-obs

      - name: Download dependencies
        shell: bash
        run: cmake -P ./scripts/download_deps.cmake

      - name: Build libobs (Windows)
        shell: pwsh
        run: ./scripts/build_libobs_windows.ps1

      - name: Configure (Windows x64)
        shell: bash
        run: cmake --preset windows-ci-x64

      - name: Build (Windows x64)
        shell: bash
        run: cmake --build --preset windows-ci-x64

      - name: Package (Windows x64)
        shell: pwsh
        run: ./scripts/package_plugin_windows.ps1 -Target x64

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.buildspec.outputs.name }}-pluginbinary-windows-x64-${{ github.run_id }}
          path: |
            release/*-windows-x64.zip
            release/*-windows-x64-pdb.zip
          if-no-files-found: error
          retention-days: ${{ inputs.pluginbinary-retention-days }}

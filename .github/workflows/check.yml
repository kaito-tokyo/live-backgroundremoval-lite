name: Check CI

# file: .github/workflows/check.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# version: 1.0.0
# date: 2026-04-14

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["*"]

permissions: {}

env:
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  check-clang-format:
    name: Check clang-format

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install clang-format with Linuxbrew
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install obsproject/tools/clang-format@19
          echo "$(brew --prefix obsproject/tools/clang-format@19)/bin" >> "$GITHUB_PATH"

      - name: Check with clang-format
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          git ls-files '*.c' '*.cpp' '*.h' '*.hpp' ':!vendor' | xargs --no-run-if-empty clang-format-19 --dry-run --Werror

  check-gersemi:
    name: Check gersemi

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install gersemi with Linuxbrew
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install obsproject/tools/gersemi
          echo "$(brew --prefix obsproject/tools/gersemi)/bin" >> "$GITHUB_PATH"

      - name: Check with gersemi
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          git ls-files CMakeLists.txt "*.cmake" ':!vendor' | xargs --no-run-if-empty gersemi --check

  check-reuse:
    name: Check reuse

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install reuse with Linuxbrew
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install reuse
          echo "$(brew --prefix reuse)/bin" >> "$GITHUB_PATH"

      - name: Lint with reuse
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: reuse lint

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    exclude-paths:
      - ".github/workflows/*.lock.yml"

  - package-ecosystem: npm
    directory: /pages
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "@types/node"
        versions: ["*"]

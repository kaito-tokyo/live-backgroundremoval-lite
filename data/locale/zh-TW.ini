; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>濾鏡等級:</b> 較高的濾鏡等級會套用更進階的背景移除技術，<br />進而提升影片品質。<br />若要獲得更好的結果，請選擇較高的等級。"
filterLevelDescription400="<b>400 - 導引濾波:</b> 可產生最銳利的遮罩，但可能造成明顯的<br />閃爍。當你需要最高的邊緣清晰度，且可以接受一些遮罩不穩定時，<br />建議使用此選項。"
filterLevelDescription500="<b>500 - 時間平均濾波:</b> 可產生視覺上最穩定且最易觀看的遮罩，<br />並提供最一致且高效率的處理負載。適合追求平順結果與穩定效能。"

filterLevelDefault="預設"
filterLevelPassthrough="100 - 直通"
filterLevelSegmentation="200 - AI 分割"
filterLevelMotionIntensityThresholding="300 - 動作強度閾值"
filterLevelGuidedFilter="400 - 導引濾波"
filterLevelTimeAveragedFilter="500 - 時間平均濾波"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>動作強度閾值:</b> 此參數用來設定略過 AI 計算的閾值。<br />為了獲得最佳穩定性，請在遮罩仍能跟隨動作的前提下盡量調低，<br />通常可設為比最小值高約 10 dB。"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>動作追蹤速度:</b> 控制最新影格反映到遮罩中的速度。設為約 0.2<br />可將閃爍降到最低，設為約 0.8 可保持遮罩銳利。在 1.0 時，閃爍抑制<br />將會完全停用。"

blurSizeDescription="<b>模糊大小:</b> 模糊量。設為 0 可停用模糊。"

advancedSettings="進階設定"

guidedFilterEpsPowDb="導引濾波 Eps [dB]"

maskGamma="遮罩 Gamma"
maskLowerBoundAmpDb="遮罩下限 [dB]"
maskUpperBoundMarginAmpDb="遮罩上限邊距 [dB]"

openGlobalConfigDialog="開啟全域設定"

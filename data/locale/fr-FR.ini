filterLevelMotionIntensityThresholding="300 - Seuil d'intensite du mouvement"
filterLevelGuidedFilter="400 - Filtre guide"
filterLevelTimeAveragedFilter="500 - Filtre a moyenne temporelle"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Seuil d'intensite du mouvement :</b> Ce parametre definit le seuil<br />pour ignorer les calculs IA.<br />Pour une meilleure stabilite, reglez-le aussi bas que possible tant que<br />le masque suit le mouvement, generalement environ 10 dB au-dessus du minimum."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Vitesse de suivi du mouvement :</b> Controle la rapidite avec laquelle<br />la derniere image est refletee dans le masque. Reglez a 0.2 pour minimiser<br />le scintillement, ou a 0.8 pour garder un masque net. A 1.0, la reduction<br />du scintillement est completement desactivee."

blurSizeDescription="<b>Taille du flou :</b> Quantite de flou. Reglez sur 0 pour le desactiver."

advancedSettings="Parametres avances"

guidedFilterEpsPowDb="Eps du filtre guide [dB]"

maskGamma="Gamma du masque"

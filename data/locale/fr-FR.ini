; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>Niveau de filtre :</b> Des niveaux plus eleves ameliorent la qualite<br />video en appliquant des techniques plus avancees de suppression d'arriere-plan.<br />Selectionnez un niveau plus eleve pour de meilleurs resultats."
filterLevelDescription400="<b>400 - Filtre guide :</b> Produit le masque le plus net, mais peut<br />provoquer un scintillement visible. Recommande lorsque la clarte maximale<br />des contours est necessaire et qu'une certaine instabilite est acceptable."
filterLevelDescription500="<b>500 - Filtre a moyenne temporelle :</b> Produit le masque le plus stable<br />et le plus agreable a regarder, avec une charge de traitement constante<br />et efficace. Recommande pour des resultats fluides et fiables."


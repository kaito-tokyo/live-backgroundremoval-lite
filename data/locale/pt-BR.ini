; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>Nivel do filtro:</b> Niveis mais altos de filtro melhoram a qualidade<br />do video aplicando tecnicas mais avancadas de remocao de fundo.<br />Selecione um nivel mais alto para obter melhores resultados."
filterLevelDescription400="<b>400 - Filtro guiado:</b> Produz a mascara mais nitida, mas pode causar<br />cintilacao perceptivel. Recomendado quando e necessaria maxima nitidez<br />nas bordas e alguma instabilidade da mascara e aceitavel."
filterLevelDescription500="<b>500 - Filtro com media temporal:</b> Produz a mascara visualmente mais<br />estavel e confortavel de ver, com a carga de processamento mais constante<br />e eficiente. Recomendado para resultados suaves e desempenho confiavel."


; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Limiar de intensidade de movimento:</b> Este parametro define o<br />limiar para pular calculos de IA.<br />Para obter melhor estabilidade, ajuste o mais baixo possivel enquanto a<br />mascara ainda acompanha o movimento, geralmente cerca de 10 dB acima do minimo."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Velocidade de rastreamento do movimento:</b> Controla a rapidez com<br />que o quadro mais recente e refletido na mascara. Defina em torno de 0.2<br />para minimizar a cintilacao, ou em torno de 0.8 para manter a mascara<br />nitida. Em 1.0, a reducao de cintilacao e totalmente desativada."

blurSizeDescription="<b>Tamanho do desfoque:</b> Quantidade de desfoque. Defina 0 para desativar."


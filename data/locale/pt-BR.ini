filterLevelMotionIntensityThresholding="300 - Limite de Intensidade de Movimento"
filterLevelGuidedFilter="400 - Filtro Guiado"
filterLevelTimeAveragedFilter="500 - Filtro Média Temporal"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Limite de Intensidade de Movimento:</b> Este parâmetro define o limite<br />para pular cálculos de IA.<br />Para maior estabilidade, defina o mais baixo possível enquanto a máscara ainda<br />segue o movimento, normalmente cerca de 10 dB acima do seu valor mínimo."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Velocidade de Rastreamento de Movimento:</b> Controla a rapidez com que o último quadro<br />é refletido na máscara. Defina em torno de 0,2 para minimizar a cintilação, ou<br />em torno de 0,8 para manter a máscara nítida. Em 1,0, a redução de cintilação<br />é completamente desativada."

blurSizeDescription="<b>Tamanho do desfoque:</b> Quantidade de desfoque. Defina 0 para desativar."


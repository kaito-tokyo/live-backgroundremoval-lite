; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>Nivel de filtro:</b> Los niveles de filtro mas altos mejoran la<br />calidad del video aplicando tecnicas mas avanzadas de eliminacion de fondo.<br />Selecciona un nivel mas alto para obtener mejores resultados."
filterLevelDescription400="<b>400 - Filtro guiado:</b> Produce la mascara mas nitida, pero puede<br />causar parpadeo perceptible. Recomendado cuando se necesita la maxima<br />claridad en los bordes y se acepta algo de inestabilidad en la mascara."
filterLevelDescription500="<b>500 - Filtro con promedio temporal:</b> Produce la mascara mas estable<br />y facil de ver, con la carga de procesamiento mas constante y eficiente.<br />Recomendado para resultados suaves y rendimiento fiable."

filterLevelDefault="Predeterminado"
filterLevelPassthrough="100 - Paso directo"
filterLevelSegmentation="200 - Segmentacion por IA"
filterLevelMotionIntensityThresholding="300 - Umbral de intensidad de movimiento"
filterLevelGuidedFilter="400 - Filtro guiado"
filterLevelTimeAveragedFilter="500 - Filtro con promedio temporal"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Umbral de intensidad de movimiento:</b> Este parametro establece el<br />umbral para omitir calculos de IA.<br />Para una mejor estabilidad, ajustalo lo mas bajo posible mientras la<br />mascara siga el movimiento, normalmente unos 10 dB sobre el minimo."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Velocidad de seguimiento del movimiento:</b> Controla que tan rapido<br />se refleja el fotograma mas reciente en la mascara. Ajusta a 0.2 para<br />minimizar el parpadeo, o a 0.8 para mantener la mascara nitida. En 1.0,<br />la reduccion del parpadeo se desactiva por completo."

blurSizeDescription="<b>Tamano del desenfoque:</b> Cantidad de desenfoque. Ajusta 0 para desactivarlo."


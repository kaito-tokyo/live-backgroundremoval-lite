; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>Nivel de filtro:</b> Los niveles de filtro más altos proporcionan una mejor calidad de vídeo<br />aplicando técnicas de eliminación de fondo más avanzadas.<br />Selecciona un nivel más alto para mejores resultados."
filterLevelDescription400="<b>400 - Filtro guiado:</b> Produce la máscara más nítida, pero puede causar<br />parpadeo notable. Recomendado cuando se necesita la máxima claridad de bordes<br />y se puede aceptar cierta inestabilidad en la máscara."
filterLevelDescription500="<b>500 - Filtro promediado en el tiempo:</b> Produce la máscara más estable visualmente y<br />fácil de ver, con la carga de procesamiento más consistente y eficiente.<br />Recomendado para resultados suaves y rendimiento fiable."

filterLevelDefault="Predeterminado"
filterLevelPassthrough="100 - Paso directo"
filterLevelSegmentation="200 - Segmentación AI"
filterLevelMotionIntensityThresholding="300 - Umbral de intensidad de movimiento"
filterLevelGuidedFilter="400 - Filtro guiado"
filterLevelTimeAveragedFilter="500 - Filtro promediado en el tiempo"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Umbral de intensidad de movimiento:</b> Este parámetro establece el umbral<br />para omitir los cálculos de IA.<br />Para mayor estabilidad, ajústalo lo más bajo posible mientras la máscara<br />siga el movimiento, y normalmente unos 10 dB por encima de tu valor mínimo."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Velocidad de seguimiento de movimiento:</b> Controla la rapidez con la que el último fotograma<br />se refleja en la máscara. Ajusta a 0.2 para minimizar el parpadeo, o<br />a 0.8 para mantener la máscara nítida. En 1.0, la reducción de parpadeo<br />se desactiva completamente."

blurSizeDescription="<b>Tamaño de desenfoque:</b> Grado de desenfoque. Establece 0 para desactivar el desenfoque."

advancedSettings="Configuración avanzada"

guidedFilterEpsPowDb="Eps del filtro guiado [dB]"


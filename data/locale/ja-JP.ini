; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>フィルターレベル:</b> 高いフィルターレベルでは、より高度な<br />背景除去技術を適用することで、映像品質を向上できます。<br />より良い結果を得るには、高いレベルを選択してください。"
filterLevelDescription400="<b>400 - ガイドフィルター:</b> 最もシャープなマスクを生成<br />しますが、目立つちらつきが発生する場合があります。エッジ<br />の明瞭さを最優先し、多少の不安定さを許容できる場合に推奨。"
filterLevelDescription500="<b>500 - 時間平均フィルター:</b> 最も視覚的に安定し見やすい<br />マスクを生成し、処理負荷も最も安定して効率的です。滑らかな<br />結果と安定した性能を重視する場合に推奨されます。"

filterLevelDefault="デフォルト"
filterLevelPassthrough="100 - パススルー"
filterLevelSegmentation="200 - AIセグメンテーション"
filterLevelMotionIntensityThresholding="300 - 動き強度しきい値"
filterLevelGuidedFilter="400 - ガイドフィルター"
filterLevelTimeAveragedFilter="500 - 時間平均フィルター"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>動き強度しきい値:</b> このパラメーターは、AI計算を<br />スキップするためのしきい値を設定します。<br />最も安定させるには、マスクが動きに追従する範囲でできるだけ<br />低く設定し、通常は最小値より約10 dB高い値を目安にします。"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>動き追従速度:</b> 最新フレームがどの程度の速さでマスクに<br />反映されるかを制御します。ちらつきを抑えるには 0.2 前後、<br />マスクのシャープさを保つには 0.8 前後を設定してください。<br />1.0 ではちらつき低減が完全に無効になります。"

blurSizeDescription="<b>ぼかしサイズ:</b> ぼかし量です。0 でぼかしを無効化します。"

advancedSettings="詳細設定"

guidedFilterEpsPowDb="ガイドフィルター Eps [dB]"


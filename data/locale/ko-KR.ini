filterLevelGuidedFilter="400 - 가이드 필터"
filterLevelTimeAveragedFilter="500 - 시간 평균 필터"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>움직임 강도 임계값:</b> 이 매개변수는 AI 계산을 건너뛸<br />임계값을 설정합니다.<br />가장 안정적으로 사용하려면 마스크가 움직임을 따라가는 범위에서<br />가능한 한 낮게 설정하고, 보통 최소값보다 약 10 dB 높게 맞춥니다."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>움직임 추적 속도:</b> 최신 프레임이 마스크에 얼마나 빠르게<br />반영되는지 제어합니다. 깜빡임을 줄이려면 0.2 정도, 마스크를<br />선명하게 유지하려면 0.8 정도로 설정하세요. 1.0에서는 깜빡임<br />감소 기능이 완전히 비활성화됩니다."

blurSizeDescription="<b>블러 크기:</b> 블러 양입니다. 0으로 설정하면 블러가 비활성화됩니다."


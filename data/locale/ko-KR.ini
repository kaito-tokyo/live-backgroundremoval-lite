; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>필터 수준:</b> 더 높은 필터 수준은 더 고급 배경 제거 기법을<br />적용하여 비디오 품질을 향상합니다.<br />더 나은 결과를 원하면 더 높은 수준을 선택하세요."
filterLevelDescription400="<b>400 - 가이드 필터:</b> 가장 선명한 마스크를 만들지만,<br />눈에 띄는 깜빡임이 발생할 수 있습니다. 가장자리 선명도가<br />중요하고 약간의 마스크 불안정성을 허용할 수 있을 때 권장됩니다."
filterLevelDescription500="<b>500 - 시간 평균 필터:</b> 가장 안정적이고 보기 쉬운 마스크를<br />생성하며, 처리 부하도 가장 일관되고 효율적입니다.<br />부드러운 결과와 안정적인 성능이 필요할 때 권장됩니다."

filterLevelDefault="기본값"
filterLevelPassthrough="100 - 패스스루"
filterLevelSegmentation="200 - AI 세그멘테이션"

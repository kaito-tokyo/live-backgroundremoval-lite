; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>滤镜级别:</b> 更高的滤镜级别会应用更高级的背景移除技术，<br />从而提升视频质量。<br />如需更好的效果，请选择更高的级别。"
filterLevelDescription400="<b>400 - 引导滤波:</b> 可生成最锐利的蒙版，但可能会产生明显的<br />闪烁。适用于需要最高边缘清晰度，并且可以接受一定蒙版不稳定<br />性的场景。"
filterLevelDescription500="<b>500 - 时间平均滤波:</b> 可生成视觉上最稳定、最易观看的蒙版，<br />并且处理负载最稳定、最高效。适合追求平滑效果和可靠性能的场景。"

filterLevelDefault="默认"
filterLevelPassthrough="100 - 直通"
filterLevelSegmentation="200 - AI 分割"
filterLevelMotionIntensityThresholding="300 - 运动强度阈值"
filterLevelGuidedFilter="400 - 引导滤波"
filterLevelTimeAveragedFilter="500 - 时间平均滤波"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>运动强度阈值:</b> 此参数用于设置跳过 AI 计算的阈值。<br />为了获得最佳稳定性，应在蒙版仍能跟随运动的前提下尽可能调低，<br />通常设置为比最小值高约 10 dB。"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>运动跟踪速度:</b> 控制最新帧反映到蒙版中的速度。设为约 0.2<br />可尽量减少闪烁，设为约 0.8 可保持蒙版锐利。在 1.0 时，闪烁抑制<br />将被完全禁用。"

blurSizeDescription="<b>模糊大小:</b> 模糊量。设为 0 可禁用模糊。"

advancedSettings="高级设置"

guidedFilterEpsPowDb="引导滤波 Eps [dB]"

maskGamma="蒙版伽马"
maskLowerBoundAmpDb="蒙版下限 [dB]"
maskUpperBoundMarginAmpDb="蒙版上限边距 [dB]"

openGlobalConfigDialog="打开全局配置"

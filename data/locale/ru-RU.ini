; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>Уровень фильтра:</b> Более высокие уровни фильтра улучшают качество<br />видео за счет применения более продвинутых методов удаления фона.<br />Выберите более высокий уровень для лучшего результата."
filterLevelDescription400="<b>400 - Управляемый фильтр:</b> Создает наиболее четкую маску, но может<br />вызывать заметное мерцание. Рекомендуется, когда нужна максимальная<br />четкость краев и допустима некоторая нестабильность маски."
filterLevelDescription500="<b>500 - Фильтр с временным усреднением:</b> Создает наиболее стабильную<br />и комфортную для просмотра маску при самой ровной и эффективной нагрузке<br />обработки. Рекомендуется для плавного результата и надежной работы."

filterLevelDefault="По умолчанию"
filterLevelPassthrough="100 - Прямой проход"
filterLevelSegmentation="200 - Сегментация ИИ"
filterLevelMotionIntensityThresholding="300 - Порог интенсивности движения"
filterLevelGuidedFilter="400 - Управляемый фильтр"
filterLevelTimeAveragedFilter="500 - Фильтр с временным усреднением"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Порог интенсивности движения:</b> Этот параметр задает порог для<br />пропуска вычислений ИИ.<br />Для лучшей стабильности устанавливайте его как можно ниже, пока маска<br />еще следует за движением, обычно примерно на 10 dB выше минимума."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Скорость отслеживания движения:</b> Управляет тем, насколько быстро<br />последний кадр отражается в маске. Установите около 0.2 для уменьшения<br />мерцания или около 0.8 для сохранения четкости маски. При 1.0 снижение<br />мерцания полностью отключается."

blurSizeDescription="<b>Размер размытия:</b> Степень размытия. Установите 0, чтобы отключить его."


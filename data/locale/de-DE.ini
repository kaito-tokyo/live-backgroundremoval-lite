filterLevelGuidedFilter="400 - Gefuhrter Filter"
filterLevelTimeAveragedFilter="500 - Zeitlich gemittelter Filter"

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
motionIntensityThresholdPowDbDescription="<b>Bewegungsintensitatsschwelle:</b> Dieser Parameter legt den<br />Schwellenwert zum Uberspringen von KI-Berechnungen fest.<br />Fur beste Stabilitat so niedrig wie moglich einstellen, solange die<br />Maske der Bewegung folgt, typischerweise etwa 10 dB uber dem Minimum."

; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
timeAveragedFilteringAlphaDescription="<b>Bewegungsverfolgungsgeschwindigkeit:</b> Steuert, wie schnell das<br />neueste Bild in der Maske erscheint. Etwa 0.2 minimiert Flackern, etwa<br />0.8 halt die Maske scharf. Bei 1.0 ist die Flackerreduktion vollstandig<br />deaktiviert."

blurSizeDescription="<b>Unscharfegrosse:</b> Menge der Unscharfe. 0 deaktiviert die Unscharfe."


; Word-wrap by <br /> approximately every 60 letters. Do not count tags as letters and don't need to break on punctuations.
filterLevelDescription="<b>Filterstufe:</b> Hohere Filterstufen verbessern die Video<br />qualitat durch fortschrittlichere Techniken zur Hintergrundentfernung.<br />Wahlen Sie eine hohere Stufe fur bessere Ergebnisse."
filterLevelDescription400="<b>400 - Gefuhrter Filter:</b> Erzeugt die scharfste Maske, kann aber<br />deutliches Flackern verursachen. Empfohlen, wenn maximale Kantenscharfe<br />benotigt wird und etwas Maskeninstabilitat akzeptabel ist."
filterLevelDescription500="<b>500 - Zeitlich gemittelter Filter:</b> Erzeugt die visuell stabilste<br />und angenehmste Maske bei gleichmassigster und effizienter Verarbeitung.<br />Empfohlen fur ruhige Ergebnisse und zuverlassige Leistung."

